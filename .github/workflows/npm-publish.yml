name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      # Install only — compiled bundles are already committed, no rebuild needed
      - run: npm install --ignore-scripts

      # Guard: skip if this version is already published (prevents re-tag accidents)
      - name: Check if version already published
        id: version_check
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "version=$PKG_VERSION" >> $GITHUB_OUTPUT
          if npm view vibelearn@$PKG_VERSION version 2>/dev/null; then
            echo "already_published=true" >> $GITHUB_OUTPUT
          else
            echo "already_published=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to npm
        if: steps.version_check.outputs.already_published == 'false'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Skip (already published)
        if: steps.version_check.outputs.already_published == 'true'
        run: echo "⚠️ v${{ steps.version_check.outputs.version }} already on npm — skipping publish."

      # Sync marketplace.json and plugin.json with package.json version
      # Bumps updatedAt so Claude Code detects the new version in the plugin store
      - name: Sync plugin version files
        if: steps.version_check.outputs.already_published == 'false'
        run: |
          PKG_VERSION=${{ steps.version_check.outputs.version }}
          node -e "
            const fs = require('fs');

            // Update .claude-plugin/marketplace.json
            const mp = JSON.parse(fs.readFileSync('.claude-plugin/marketplace.json', 'utf-8'));
            mp.plugins[0].version = '$PKG_VERSION';
            mp.plugins[0].updatedAt = new Date().toISOString();
            fs.writeFileSync('.claude-plugin/marketplace.json', JSON.stringify(mp, null, 2) + '\n');
            console.log('Updated marketplace.json to v$PKG_VERSION');

            // Update plugin/.claude-plugin/plugin.json — this is what Claude Code reads for installed version
            const pj = JSON.parse(fs.readFileSync('plugin/.claude-plugin/plugin.json', 'utf-8'));
            pj.version = '$PKG_VERSION';
            fs.writeFileSync('plugin/.claude-plugin/plugin.json', JSON.stringify(pj, null, 2) + '\n');
            console.log('Updated plugin/plugin.json to v$PKG_VERSION');
          "
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/marketplace.json plugin/.claude-plugin/plugin.json
          git diff --cached --quiet || git commit -m "chore: sync plugin version files to v$PKG_VERSION [skip ci]"
          git push origin HEAD:main
